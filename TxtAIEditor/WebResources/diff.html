<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TxtAIEditor File Compare</title>
    <style>
        :root {
            --bg: transparent; /* Start transparent to prevent dark flashes on load */
            --fg: #d4d4d4;
            --border: #3e3e3e;
            --header-bg: #252526;
            --gutter-bg: #1e1e1e;
            --gutter-fg: #858585;
            --added-bg: rgba(46, 160, 67, 0.15);
            --added-border: rgba(46, 160, 67, 0.4);
            --added-text: #3fb950;
            --removed-bg: rgba(248, 81, 73, 0.15);
            --removed-border: rgba(248, 81, 73, 0.4);
            --removed-text: #f85149;
            --empty-bg: #171717;
            --font-family: Consolas, "Courier New", monospace;
            --ui-font: "Segoe UI", "Malgun Gothic", sans-serif;
            --scrollmap-width: 14px;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --fg: #1a1a1a;
                --border: #e1e4e8;
                --header-bg: #f3f3f3;
                --gutter-bg: #f3f3f3;
                --gutter-fg: #6a737d;
                --added-text: #22863a;
                --removed-text: #cb2431;
                --empty-bg: #f9f9f9;
            }
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--ui-font);
        }

        #container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #title-bar {
            display: flex;
            justify-content: space-between;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
        }

        #diff-panels {
            display: flex;
            flex: 1;
            overflow: hidden;
            width: 100%;
        }

        .diff-column {
            display: flex;
            flex-direction: column;
            width: 50%;
            height: 100%;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        .diff-column:last-child {
            border-right: 0;
        }

        .panel-header {
            background: var(--header-bg);
            padding: 4px 8px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: var(--gutter-fg);
            border-bottom: 1px solid var(--border);
            font-family: var(--ui-font);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .panel-header-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            line-height: 24px;
        }

        .open-file-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--gutter-fg);
            cursor: pointer;
            padding: 4px 6px;
            margin: 0;
            border-radius: 4px;
            transition: background 0.15s, color 0.15s;
        }
        .open-file-btn:hover {
            background: rgba(128, 128, 128, 0.2);
            color: var(--fg);
        }

        /* Wrapper that contains both the scrollable content and the scrollmap */
        .panel-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .view-wrapper {
            flex: 1;
            overflow: auto;
            position: relative;
        }
        /* WebView2: hide vertical scrollbar, show styled horizontal */
        .view-wrapper::-webkit-scrollbar {
            width: 0;
            height: 8px;
        }
        .view-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }
        .view-wrapper::-webkit-scrollbar-thumb {
            background: rgba(121, 121, 121, 0.4);
            border-radius: 4px;
        }
        .view-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(121, 121, 121, 0.6);
        }

        .scroll-spacer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .diff-view {
            position: absolute;
            top: 0;
            left: 0;
            display: table;
            border-collapse: collapse;
            font-family: var(--font-family);
            font-size: 13px;
            line-height: 20px;
        }

        .diff-row {
            display: table-row;
            height: 20px;
        }

        .line-number {
            display: table-cell;
            width: 50px;
            text-align: right;
            padding-right: 10px;
            color: var(--gutter-fg);
            background: var(--gutter-bg);
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
            border-right: 1px solid var(--border);
            height: 20px;
            box-sizing: border-box;
        }

        .line-content {
            display: table-cell;
            padding-left: 12px;
            white-space: pre;
            overflow: visible;
            height: 20px;
            box-sizing: border-box;
            vertical-align: middle;
        }

        .diff-sign {
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }

        /* Diff styling states */
        .row-added {
            background: var(--added-bg);
        }
        .row-added .line-content {
            color: var(--added-text);
            background: rgba(46, 160, 67, 0.08);
            border-left: 3px solid var(--added-border);
        }

        .row-removed {
            background: var(--removed-bg);
        }
        .row-removed .line-content {
            color: var(--removed-text);
            background: rgba(248, 81, 73, 0.08);
            border-left: 3px solid var(--removed-border);
        }

        .row-empty {
            background: var(--empty-bg);
            user-select: none;
        }
        .row-empty .line-number {
            color: transparent;
            background: var(--empty-bg);
        }

        /* ── Scrollmap (custom scrollbar with diff markers) ── */
        .scrollmap {
            width: var(--scrollmap-width);
            height: 100%;
            position: relative;
            flex-shrink: 0;
            background: rgba(128, 128, 128, 0.08);  /* 배경을 아주 옅게 */
            border-left: 1px solid var(--border);
            cursor: pointer;
            overflow: hidden;
        }

        /* Coloured markers rendered absolutely inside the scrollmap */
        .scrollmap-marker {
            position: absolute;
            left: 1px;
            right: 1px;
            min-height: 2px;
            border-radius: 1px;
            pointer-events: none;
            z-index: 1;
        }
        .scrollmap-marker.added {
            background: rgba(46, 160, 67, 0.8);
        }
        .scrollmap-marker.removed {
            background: rgba(248, 81, 73, 0.8);
        }

        /* Viewport thumb — shows the current visible region */
        .scrollmap-thumb {
            position: absolute;
            left: 0;
            right: 0;
            background: rgba(160, 160, 160, 0.25);
            border-top: 2px solid rgba(200, 200, 200, 0.7);
            border-bottom: 2px solid rgba(200, 200, 200, 0.7);
            border-radius: 2px;
            pointer-events: none;
            z-index: 10;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="title-bar">
            <span id="diff-title">TxtAIEditor 파일 비교 도구 (File Compare)</span>
            <span id="diff-stats" style="font-weight: normal; color: var(--gutter-fg);">수집 중...</span>
        </div>
        <div id="diff-panels">
            <!-- Left Panel (Original) -->
            <div class="diff-column">
                <div class="panel-header" id="left-header">원본 파일 (Original)</div>
                <div class="panel-body">
                    <div class="view-wrapper" id="left-wrapper">
                        <div class="scroll-spacer" id="left-spacer"></div>
                        <div class="diff-view" id="left-view"></div>
                    </div>
                    <div class="scrollmap" id="left-scrollmap">
                        <div class="scrollmap-thumb" id="left-thumb"></div>
                    </div>
                </div>
            </div>
            <!-- Right Panel (Modified) -->
            <div class="diff-column">
                <div class="panel-header" id="right-header">
                    <span class="panel-header-text" id="right-header-text">비교 대상 파일 (Modified)</span>
                    <button class="open-file-btn" id="right-open-btn" title="파일 열기" onclick="openRightFile()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </button>
                </div>
                <div class="panel-body">
                    <div class="view-wrapper" id="right-wrapper">
                        <div class="scroll-spacer" id="right-spacer"></div>
                        <div class="diff-view" id="right-view"></div>
                    </div>
                    <div class="scrollmap" id="right-scrollmap">
                        <div class="scrollmap-thumb" id="right-thumb"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const leftWrapper  = document.getElementById('left-wrapper');
        const rightWrapper = document.getElementById('right-wrapper');
        const leftSpacer   = document.getElementById('left-spacer');
        const rightSpacer  = document.getElementById('right-spacer');
        const leftView     = document.getElementById('left-view');
        const rightView    = document.getElementById('right-view');
        const leftScrollmap  = document.getElementById('left-scrollmap');
        const rightScrollmap = document.getElementById('right-scrollmap');
        const leftThumb  = document.getElementById('left-thumb');
        const rightThumb = document.getElementById('right-thumb');

        // Virtual scroll parameters
        const rowHeight = 20;
        let globalDiffA = [];
        let globalDiffB = [];
        let maxLineLength = 0;
        const charWidth = 8.5;

        // Prevent dragging duplicate windows
        window.addEventListener('dragover', e => e.preventDefault());
        window.addEventListener('drop',     e => e.preventDefault());

        // ── Right panel file open ────────────────────────────────────────
        let rightFilePath = '';

        function openRightFile() {
            if (rightFilePath) {
                post({ type: 'openFile', path: rightFilePath });
            }
        }

        // ── Keyboard shortcut forwarding ──────────────────────────────────
        function post(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        window.addEventListener('keydown', event => {
            if (event.key === 'F4') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'f4' });
            } else if (event.key === 'F9') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'f9' });
            } else if (event.key === 'F10') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'f10' });
            } else if (event.key === 'F11') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'f11' });
            } else if (event.key === 'F12') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'f12' });
            } else {
                const ctrl = event.ctrlKey || event.metaKey;
                const key = event.key ? event.key.toLowerCase() : '';
                if (ctrl && key === '3') {
                    event.preventDefault();
                    post({ type: 'shortcut', name: 'expandRightPanel' });
                }
            }
        });

        // ── Myers' diff comparison logic ──────────────────────────────────
        function computeLineDiff(textA, textB) {
            const linesA = textA === "" ? [] : textA.split(/\r?\n/);
            const linesB = textB === "" ? [] : textB.split(/\r?\n/);

            const N = linesA.length;
            const M = linesB.length;

            const max = N + M;
            const v = { 1: 0 };
            const history = [];

            let found = false;
            let x, y;

            const maxD = Math.min(2000, max); 

            for (let d = 0; d <= maxD; d++) {
                history.push(Object.assign({}, v));
                for (let k = -d; k <= d; k += 2) {
                    if (k === -d || (k !== d && v[k - 1] < v[k + 1])) {
                        x = v[k + 1];
                    } else {
                        x = v[k - 1] + 1;
                    }
                    y = x - k;

                    while (x < N && y < M && linesA[x] === linesB[y]) {
                        x++;
                        y++;
                    }

                    v[k] = x;

                    if (x >= N && y >= M) {
                        found = true;
                        break;
                    }
                }
                if (found) {
                    history.push(Object.assign({}, v));
                    break;
                }
            }

            const diffA = [];
            const diffB = [];

            if (!found) {
                let i = 0;
                let j = 0;
                while (i < N || j < M) {
                    if (i < N && j < M) {
                        if (linesA[i] === linesB[j]) {
                            diffA.push({ type: 'unchanged', text: linesA[i], lineNum: i + 1 });
                            diffB.push({ type: 'unchanged', text: linesB[j], lineNum: j + 1 });
                            i++; j++;
                        } else {
                            diffA.push({ type: 'removed', text: linesA[i], lineNum: i + 1 });
                            diffB.push({ type: 'empty', text: '', lineNum: null });
                            diffA.push({ type: 'empty', text: '', lineNum: null });
                            diffB.push({ type: 'added', text: linesB[j], lineNum: j + 1 });
                            i++; j++;
                        }
                    } else if (i < N) {
                        diffA.push({ type: 'removed', text: linesA[i], lineNum: i + 1 });
                        diffB.push({ type: 'empty', text: '', lineNum: null });
                        i++;
                    } else if (j < M) {
                        diffA.push({ type: 'empty', text: '', lineNum: null });
                        diffB.push({ type: 'added', text: linesB[j], lineNum: j + 1 });
                        j++;
                    }
                }
                return { diffA, diffB };
            }

            let currX = N;
            let currY = M;
            const depth = history.length - 2;

            for (let d = depth; d >= 1; d--) {
                const vAtD = history[d]; 
                const k = currX - currY;

                const dVal = d - 1;
                const getV = (kVal) => (vAtD[kVal] !== undefined ? vAtD[kVal] : -1);

                let prevK;
                if (k === -dVal || (k !== dVal && getV(k - 1) < getV(k + 1))) {
                    prevK = k + 1;
                } else {
                    prevK = k - 1;
                }

                const prevX = getV(prevK);
                const prevY = prevX - prevK;

                while (currX > prevX && currY > prevY) {
                    diffA.unshift({ type: 'unchanged', text: linesA[currX - 1], lineNum: currX });
                    diffB.unshift({ type: 'unchanged', text: linesB[currY - 1], lineNum: currY });
                    currX--;
                    currY--;
                }

                if (currX > prevX) {
                    diffA.unshift({ type: 'removed', text: linesA[currX - 1], lineNum: currX });
                    diffB.unshift({ type: 'empty', text: '', lineNum: null });
                    currX--;
                } else if (currY > prevY) {
                    diffA.unshift({ type: 'empty', text: '', lineNum: null });
                    diffB.unshift({ type: 'added', text: linesB[currY - 1], lineNum: currY });
                    currY--;
                }
            }

            while (currX > 0 && currY > 0) {
                diffA.unshift({ type: 'unchanged', text: linesA[currX - 1], lineNum: currX });
                diffB.unshift({ type: 'unchanged', text: linesB[currY - 1], lineNum: currY });
                currX--;
                currY--;
            }

            return { diffA, diffB };
        }

        // ── Scrollmap helpers ──────────────────────────────────────────────
        function buildScrollmapMarkers(scrollmap, diffArray, markerClass) {
            scrollmap.querySelectorAll('.scrollmap-marker').forEach(el => el.remove());

            const mapH = scrollmap.clientHeight;
            const totalH = diffArray.length * rowHeight;
            if (totalH === 0 || mapH === 0) return;

            const scale = mapH / totalH;
            const bands = [];
            let currentBand = null;

            for (let k = 0; k < diffArray.length; k++) {
                const item = diffArray[k];
                if (item.type === markerClass) {
                    const top = k * rowHeight * scale;
                    const height = Math.max(rowHeight * scale, 1.5);
                    const bottom = top + height;

                    if (currentBand && top <= currentBand.bottom + 1) {
                        currentBand.bottom = Math.max(currentBand.bottom, bottom);
                    } else {
                        if (currentBand) {
                            bands.push(currentBand);
                        }
                        currentBand = { top, bottom };
                    }
                } else {
                    if (currentBand) {
                        bands.push(currentBand);
                        currentBand = null;
                    }
                }
            }
            if (currentBand) {
                bands.push(currentBand);
            }

            const thumb = scrollmap.querySelector('.scrollmap-thumb');
            bands.forEach(band => {
                const marker = document.createElement('div');
                marker.className = `scrollmap-marker ${markerClass}`;
                marker.style.top = `${band.top}px`;
                marker.style.height = `${Math.max(band.bottom - band.top, 2)}px`;
                scrollmap.insertBefore(marker, thumb);
            });
        }

        function updateScrollmapThumb(wrapper, scrollmap, thumb) {
            const mapH   = scrollmap.clientHeight;
            const totalH = globalDiffA.length * rowHeight;
            if (totalH === 0 || mapH === 0) return;

            const scale   = mapH / totalH;
            const viewH   = wrapper.clientHeight;
            const scrollY = wrapper.scrollTop;

            const thumbTop = scrollY * scale;
            const thumbH   = totalH <= viewH ? mapH : Math.max(viewH * scale, 8);

            thumb.style.top    = `${thumbTop}px`;
            thumb.style.height = `${thumbH}px`;
        }

        function attachScrollmapInput(scrollmap, wrapper, thumb) {
            function scrollToRatio(clientY) {
                const rect   = scrollmap.getBoundingClientRect();
                const ratio  = Math.min(Math.max((clientY - rect.top) / rect.height, 0), 1);
                const totalH = globalDiffA.length * rowHeight;
                const maxSc  = totalH - wrapper.clientHeight;
                wrapper.scrollTop = ratio * maxSc;
            }

            let dragging = false;
            scrollmap.addEventListener('mousedown', e => {
                dragging = true;
                scrollToRatio(e.clientY);
                e.preventDefault();
            });
            window.addEventListener('mousemove', e => {
                if (dragging) scrollToRatio(e.clientY);
            });
            window.addEventListener('mouseup', () => { dragging = false; });
        }

        // ── List Virtualization Logic ──────────────────────────────────────
        function renderVisibleRows() {
            const totalRows = globalDiffA.length;
            const viewHeight = leftWrapper.clientHeight;
            const scrollTop = leftWrapper.scrollTop;

            const startIndex = Math.max(0, Math.floor(scrollTop / rowHeight) - 5);
            const endIndex = Math.min(totalRows - 1, Math.ceil((scrollTop + viewHeight) / rowHeight) + 5);

            let leftHtml = '';
            let rightHtml = '';

            for (let k = startIndex; k <= endIndex; k++) {
                const itemA = globalDiffA[k];
                const itemB = globalDiffB[k];

                // Left row
                if (itemA.type === 'removed') {
                    leftHtml += `<div class="diff-row row-removed"><div class="line-number">${itemA.lineNum}</div><div class="line-content"><span class="diff-sign">- </span>${escapeHtml(itemA.text)}</div></div>`;
                } else if (itemA.type === 'empty') {
                    leftHtml += `<div class="diff-row row-empty"><div class="line-number"></div><div class="line-content"></div></div>`;
                } else {
                    leftHtml += `<div class="diff-row"><div class="line-number">${itemA.lineNum}</div><div class="line-content"><span class="diff-sign">  </span>${escapeHtml(itemA.text)}</div></div>`;
                }

                // Right row
                if (itemB.type === 'added') {
                    rightHtml += `<div class="diff-row row-added"><div class="line-number">${itemB.lineNum}</div><div class="line-content"><span class="diff-sign">+ </span>${escapeHtml(itemB.text)}</div></div>`;
                } else if (itemB.type === 'empty') {
                    rightHtml += `<div class="diff-row row-empty"><div class="line-number"></div><div class="line-content"></div></div>`;
                } else {
                    rightHtml += `<div class="diff-row"><div class="line-number">${itemB.lineNum}</div><div class="line-content"><span class="diff-sign">  </span>${escapeHtml(itemB.text)}</div></div>`;
                }
            }

            leftView.innerHTML = leftHtml;
            rightView.innerHTML = rightHtml;

            const offset = startIndex * rowHeight;
            leftView.style.transform = `translateY(${offset}px)`;
            rightView.style.transform = `translateY(${offset}px)`;
        }

        function updateSpacerWidths() {
            const minWidth = leftWrapper.clientWidth;
            const finalWidth = Math.max(minWidth, maxLineLength * charWidth + 100);
            const widthPx = `${finalWidth}px`;
            
            leftSpacer.style.width = widthPx;
            rightSpacer.style.width = widthPx;
            leftView.style.width = widthPx;
            rightView.style.width = widthPx;
        }

        // ── Render ─────────────────────────────────────────────────────────
        function renderDiff(data) {
            const { diffA, diffB } = computeLineDiff(data.textA, data.textB);
            globalDiffA = diffA;
            globalDiffB = diffB;

            // Compute maximum line length
            maxLineLength = 0;
            for (let k = 0; k < diffA.length; k++) {
                if (diffA[k].text.length > maxLineLength) maxLineLength = diffA[k].text.length;
                if (diffB[k].text.length > maxLineLength) maxLineLength = diffB[k].text.length;
            }

            // Update title
            const diffTitleEl = document.getElementById('diff-title');
            if (diffTitleEl && data.compareToolTitle) {
                diffTitleEl.textContent = data.compareToolTitle;
            }

            const prefixA = data.originalPrefix || '원본: ';
            const prefixB = data.modifiedPrefix || '수정본: ';
            const defaultLabelA = data.originalFileLabel || '원본 파일 (Original)';
            const defaultLabelB = data.modifiedFileLabel || '비교 대상 파일 (Modified)';

            document.getElementById('left-header').textContent  = `${prefixA}${data.titleA || defaultLabelA}`;
            const rightHeaderText = document.getElementById('right-header-text');
            if (rightHeaderText) {
                rightHeaderText.textContent = `${prefixB}${data.titleB || defaultLabelB}`;
            }

            // Store pathB and tooltip for open file button
            rightFilePath = data.pathB || '';
            const openBtn = document.getElementById('right-open-btn');
            if (openBtn && data.openFileTooltip) {
                openBtn.title = data.openFileTooltip;
            }

            // Set spacer height
            const totalHeight = diffA.length * rowHeight;
            leftSpacer.style.height = `${totalHeight}px`;
            rightSpacer.style.height = `${totalHeight}px`;

            updateSpacerWidths();

            // Calculate diff stats
            let additions = 0;
            let deletions = 0;
            for (let k = 0; k < diffA.length; k++) {
                if (diffA[k].type === 'removed') deletions++;
                if (diffB[k].type === 'added') additions++;
            }

            const formatStr = data.diffStatsFormat || '변경사항: 추가 {0}줄, 삭제 {1}줄';
            document.getElementById('diff-stats').textContent = formatStr
                .replace('{0}', additions)
                .replace('{1}', deletions);

            // Initial render
            renderVisibleRows();

            requestAnimationFrame(() => {
                buildScrollmapMarkers(leftScrollmap,  globalDiffA,  'removed');
                buildScrollmapMarkers(rightScrollmap, globalDiffB, 'added');
                updateScrollmapThumb(leftWrapper,  leftScrollmap,  leftThumb);
                updateScrollmapThumb(rightWrapper, rightScrollmap, rightThumb);
            });
        }

        function escapeHtml(value) {
            return (value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ── Synchronized Scrolling ─────────────────────────────────────────
        let isSyncingLeftScroll  = false;
        let isSyncingRightScroll = false;

        function onScroll() {
            renderVisibleRows();
            updateScrollmapThumb(leftWrapper,  leftScrollmap,  leftThumb);
            updateScrollmapThumb(rightWrapper, rightScrollmap, rightThumb);
        }

        leftWrapper.addEventListener('scroll', () => {
            if (isSyncingLeftScroll) { isSyncingLeftScroll = false; return; }
            isSyncingRightScroll = true;
            rightWrapper.scrollTop  = leftWrapper.scrollTop;
            rightWrapper.scrollLeft = leftWrapper.scrollLeft;
            onScroll();
        });

        rightWrapper.addEventListener('scroll', () => {
            if (isSyncingRightScroll) { isSyncingRightScroll = false; return; }
            isSyncingLeftScroll = true;
            leftWrapper.scrollTop  = rightWrapper.scrollTop;
            leftWrapper.scrollLeft = rightWrapper.scrollLeft;
            onScroll();
        });

        // Scrollmap click/drag
        attachScrollmapInput(leftScrollmap,  leftWrapper,  leftThumb);
        attachScrollmapInput(rightScrollmap, rightWrapper, rightThumb);

        // Rebuild on resize
        const resizeObs = new ResizeObserver(() => {
            updateSpacerWidths();
            renderVisibleRows();
            buildScrollmapMarkers(leftScrollmap,  globalDiffA,  'removed');
            buildScrollmapMarkers(rightScrollmap, globalDiffB, 'added');
            updateScrollmapThumb(leftWrapper,  leftScrollmap,  leftThumb);
            updateScrollmapThumb(rightWrapper, rightScrollmap, rightThumb);
        });
        resizeObs.observe(leftScrollmap);
        resizeObs.observe(rightScrollmap);
        resizeObs.observe(leftWrapper);

        function applyThemeSettings(theme, uiFontFamily, editorFontFamily) {
            const bg    = theme === 'PastelDark' ? '#24273a' : (theme === 'Light' ? '#ffffff' : '#1e1e1e');
            const fg    = theme === 'PastelDark' ? '#cad3f5' : (theme === 'Light' ? '#1a1a1a' : '#d4d4d4');
            const empty = theme === 'PastelDark' ? '#181926' : (theme === 'Light' ? '#f9f9f9' : '#171717');
            
            document.documentElement.style.setProperty('--bg',         bg);
            document.documentElement.style.setProperty('--fg',         fg);
            document.documentElement.style.setProperty('--empty-bg',   empty);
            document.documentElement.style.setProperty('--header-bg',  theme === 'PastelDark' ? '#1e2030' : (theme === 'Light' ? '#f3f3f3' : '#252526'));
            document.documentElement.style.setProperty('--gutter-bg',  theme === 'PastelDark' ? '#1e2030' : (theme === 'Light' ? '#f3f3f3' : '#1e1e1e'));
            document.documentElement.style.setProperty('--border',     theme === 'PastelDark' ? '#36394f' : (theme === 'Light' ? '#e1e4e8' : '#3e3e3e'));
            
            if (uiFontFamily) {
                document.documentElement.style.setProperty('--ui-font',    uiFontFamily);
            }
            if (editorFontFamily) {
                document.documentElement.style.setProperty('--font-family', editorFontFamily);
            }

            const addedText   = theme === 'PastelDark' ? '#a6da95' : (theme === 'Light' ? '#22863a' : '#3fb950');
            const removedText = theme === 'PastelDark' ? '#ed8796' : (theme === 'Light' ? '#cb2431' : '#f85149');
            document.documentElement.style.setProperty('--added-text',   addedText);
            document.documentElement.style.setProperty('--removed-text', removedText);
        }

        // ── WebView2 IPC ───────────────────────────────────────────────────
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                if (msg.action === 'compare') {
                    if (msg.statsGathering) {
                        document.getElementById('diff-stats').textContent = msg.statsGathering;
                    }
                    applyThemeSettings(msg.theme || 'Dark', msg.uiFontFamily, null);
                    renderDiff(msg);
                } else if (msg.action === 'updateOptions') {
                    applyThemeSettings(msg.theme || 'Dark', null, msg.fontFamily);
                }
            });
        }
    </script>
</body>
</html>
